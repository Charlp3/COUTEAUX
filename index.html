<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Couteaux</title>
  <style>
    :root{
      --bg:#232629;
      --panel:#2c3136;
      --panel2:#353b41;
      --line:#4b545d;
      --text:#eef2f4;
      --muted:#b8c0c7;
      --gold1:#d19a3c;
      --gold2:#a9741d;
      --btn1:#464d55;
      --btn2:#363c43;
      --danger1:#bb6a6a;
      --danger2:#8f4e4e;
      --ok:#79b07b;
      --radius:16px;
      --shadow:0 8px 20px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    body{padding:14px 14px 28px}
    .app{max-width:1200px;margin:0 auto}
    .card{
      background:linear-gradient(180deg,var(--panel2) 0%,var(--panel) 100%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .header{
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#3a4046 0%,#2f3439 100%);
    }
    .title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.8rem}
    .count-pill{
      min-width:54px;
      padding:6px 14px;
      border-radius:999px;
      background:linear-gradient(180deg,var(--gold1) 0%,var(--gold2) 100%);
      color:#fff;
      font-weight:700;
      text-align:center;
    }
    .subtitle{margin-top:8px;color:var(--muted);font-size:.96rem}
    .toolbar{
      display:grid;
      grid-template-columns:1.15fr 1fr;
      gap:10px;
      padding:14px;
      border-bottom:1px solid var(--line);
      background:#2b2f34;
    }
    .toolbar-left,.toolbar-right{
      display:flex;flex-wrap:wrap;gap:10px;align-items:center
    }
    .toolbar-right{justify-content:flex-end}
    input[type="search"], input[type="text"], textarea{
      min-height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#1f2327;
      color:var(--text);
      padding:10px 12px;
      outline:none;
      font:inherit;
    }
    input[type="search"]{width:min(100%,360px)}
    input[type="file"]{display:none}
    .btn{
      min-height:42px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      background:linear-gradient(180deg,var(--btn1) 0%,var(--btn2) 100%);
      color:var(--text);
      font-weight:600;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .btn.accent{background:linear-gradient(180deg,#c89a4d 0%,#9a6d21 100%)}
    .btn.secondary{background:linear-gradient(180deg,#3c434b 0%,#2f353b 100%)}
    .btn.danger{background:linear-gradient(180deg,var(--danger1) 0%,var(--danger2) 100%)}

    .table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;background:#25292d}
    table{width:100%;min-width:980px;border-collapse:collapse}
    thead th{
      position:sticky;top:0;z-index:2;
      background:#1f2327;color:#fff;border-bottom:1px solid var(--line);
      padding:12px 10px;text-align:left;font-size:.95rem;white-space:nowrap
    }
    th.sortable{cursor:pointer}
    th.sortable::after{content:" ⇅";color:#9eb6c9;font-size:.9em}
    tbody td{border-bottom:1px solid #434b54;padding:0;vertical-align:top}
    tbody tr:nth-child(odd){background:#30353a}
    tbody tr:nth-child(even){background:#3a4046}
    td input, td textarea{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:.95rem;
      border-radius:0;
    }
    td input{min-height:44px;padding:10px}
    td.notes{min-width:360px}
    td.notes textarea{
      min-height:72px;
      padding:10px;
      resize:vertical;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
    }
    td.actions{
      width:72px;
      text-align:center;
      padding:6px;
      vertical-align:middle;
    }
    .row-delete{
      width:42px;height:42px;border-radius:10px;border:1px solid #6e4a4a;
      background:linear-gradient(180deg,#8a5050 0%,#6b3e3e 100%);
      color:#fff;font-size:1.1rem;cursor:pointer;
    }
    .footer{
      padding:12px 16px 16px;
      color:var(--muted);
      font-size:.9rem;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      border-top:1px solid var(--line);
      background:#2a2e33;
    }
    .small{font-size:.87rem;color:var(--muted)}
    .hidden{display:none !important}
    .status{
      padding:10px 14px;
      font-size:.92rem;
      border-top:1px solid var(--line);
      background:#23272b;
      color:#dfe7ec;
      min-height:44px;
    }
    .status.ok{color:#cce8c8}
    .status.warn{color:#f0d39b}
    .status.err{color:#f2b1b1}

    @media (max-width:820px){
      .toolbar{grid-template-columns:1fr}
      .toolbar-right{justify-content:flex-start}
      h1{font-size:1.55rem}
      td.notes{min-width:300px}
    }

    @media print{
      body{background:#fff;color:#000;padding:0}
      .card{box-shadow:none;border:0;border-radius:0}
      .header,.toolbar,.footer,.status{display:none !important}
      .table-wrap{overflow:visible;background:#fff}
      table{min-width:0;width:100%}
      thead th{position:static;background:#ddd !important;color:#000 !important;border:1px solid #999}
      tbody tr:nth-child(odd),tbody tr:nth-child(even){background:#fff !important}
      tbody td{border:1px solid #999}
      td input,td textarea{color:#000 !important}
      td.actions,th.actions{display:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="header">
        <div class="title-row">
          <h1>Couteaux</h1>
          <div class="count-pill" id="countPill">0</div>
        </div>
        <div class="subtitle">Collection personnelle — sauvegarde robuste IndexedDB + secours localStorage — v2.0</div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <input type="search" id="searchInput" placeholder="Recherche dans le tableau…">
          <button type="button" class="btn accent" id="addRowBtn">+ Ajouter une pièce</button>
        </div>
        <div class="toolbar-right">
          <button type="button" class="btn secondary" id="saveJsonBtn">Sauvegarder JSON</button>
          <label class="btn secondary" for="loadJsonInput">Récupérer JSON</label>
          <input type="file" id="loadJsonInput" accept=".json,application/json">
          <button type="button" class="btn secondary" id="printBtn">Imprimer / PDF</button>
          <button type="button" class="btn danger" id="clearBtn">Vider</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="knivesTable" aria-label="Tableau de collection de couteaux">
          <thead>
            <tr>
              <th class="sortable" data-key="brand">Marques</th>
              <th class="sortable" data-key="model">Modèles</th>
              <th class="sortable" data-key="reference">Référence</th>
              <th class="sortable" data-key="length">Longueur</th>
              <th class="actions">Action</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="status" id="statusBar">Chargement…</div>

      <div class="footer">
        <div>© Pierre Charlier 2026 — v2.0</div>
        <div class="small">Capacité prévue : 50 pièces maximum</div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const MAX_ITEMS = 50;
      const FALLBACK_KEY = "couteaux_v2_fallback";
      const DB_NAME = "CouteauxDB";
      const STORE_NAME = "appState";
      const STATE_ID = "main";

      const els = {
        tableBody: document.getElementById("tableBody"),
        countPill: document.getElementById("countPill"),
        statusBar: document.getElementById("statusBar"),
        searchInput: document.getElementById("searchInput"),
        addRowBtn: document.getElementById("addRowBtn"),
        saveJsonBtn: document.getElementById("saveJsonBtn"),
        loadJsonInput: document.getElementById("loadJsonInput"),
        printBtn: document.getElementById("printBtn"),
        clearBtn: document.getElementById("clearBtn"),
        headers: document.querySelectorAll("th.sortable")
      };

      let data = [];
      let sortState = { key: null, dir: 1 };
      let db = null;
      let saveTimer = null;

      function uid() {
        return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
      }

      function emptyRow() {
        return { id: uid(), brand: "", model: "", reference: "", length: "", notes: "" };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function setStatus(message, kind = "") {
        els.statusBar.textContent = message;
        els.statusBar.className = "status" + (kind ? " " + kind : "");
      }

      function updateCount() {
        els.countPill.textContent = String(data.length);
      }

      function autoResizeTextarea(textarea) {
        textarea.style.height = "auto";
        textarea.style.height = Math.max(textarea.scrollHeight, 72) + "px";
      }

      function render() {
        const query = els.searchInput.value.trim().toLowerCase();
        els.tableBody.innerHTML = "";
        let visibleCount = 0;

        for (const row of data) {
          const hay = [row.brand, row.model, row.reference, row.length, row.notes].join(" ").toLowerCase();
          const hidden = query && !hay.includes(query);

          const tr = document.createElement("tr");
          if (hidden) tr.classList.add("hidden");
          if (!hidden) visibleCount++;

          tr.dataset.id = row.id;
          tr.innerHTML = `
            <td><input data-field="brand" value="${escapeHtml(row.brand)}"></td>
            <td><input data-field="model" value="${escapeHtml(row.model)}"></td>
            <td><input data-field="reference" value="${escapeHtml(row.reference)}"></td>
            <td><input data-field="length" value="${escapeHtml(row.length)}"></td>
            <td class="actions"><button type="button" class="row-delete" title="Supprimer">×</button></td>
            <td class="notes"><textarea data-field="notes">${escapeHtml(row.notes)}</textarea></td>
          `;
          els.tableBody.appendChild(tr);
        }

        document.querySelectorAll("td.notes textarea").forEach(autoResizeTextarea);
        updateCount();
        if (query) setStatus(`${visibleCount} ligne(s) affichée(s) pour la recherche.`);
        else setStatus("Tableau modifiable.", "ok");
      }

      function labelFor(key) {
        return { brand: "Marques", model: "Modèles", reference: "Référence", length: "Longueur" }[key] || key;
      }

      function sortBy(key) {
        if (sortState.key === key) sortState.dir *= -1;
        else sortState = { key, dir: 1 };

        data.sort((a, b) => {
          const va = (a[key] || "").toString().toLowerCase().trim();
          const vb = (b[key] || "").toString().toLowerCase().trim();
          const na = parseFloat(va.replace(",", "."));
          const nb = parseFloat(vb.replace(",", "."));
          const bothNumeric = !Number.isNaN(na) && !Number.isNaN(nb) && va !== "" && vb !== "";
          let cmp = 0;
          if (bothNumeric) cmp = na - nb;
          else cmp = va.localeCompare(vb, "fr", { numeric: true, sensitivity: "base" });
          return cmp * sortState.dir;
        });

        render();
        scheduleSave("Tri enregistré.");
        setStatus(`Tri appliqué sur « ${labelFor(key)} » (${sortState.dir === 1 ? "croissant" : "décroissant"}).`, "ok");
      }

      function addRow() {
        if (data.length >= MAX_ITEMS) {
          setStatus("Limite atteinte : 50 pièces maximum.", "warn");
          return;
        }
        data.push(emptyRow());
        render();
        scheduleSave("Nouvelle ligne enregistrée.");
        const lastInput = els.tableBody.querySelector("tr:last-child input");
        if (lastInput) lastInput.focus();
      }

      function deleteRow(id) {
        data = data.filter(r => r.id !== id);
        render();
        scheduleSave("Suppression enregistrée.");
      }

      function updateField(id, field, value) {
        const row = data.find(r => r.id === id);
        if (!row) return;
        row[field] = value;
        scheduleSave("Enregistré.");
      }

      function exportJson() {
        const payload = {
          app: "Couteaux",
          version: "2.0",
          exportedAt: new Date().toISOString(),
          count: data.length,
          items: data
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Couteaux_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus("JSON exporté.", "ok");
      }

      function importJson(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const parsed = JSON.parse(e.target.result);
            let items = Array.isArray(parsed) ? parsed : parsed.items;
            if (!Array.isArray(items)) throw new Error("Format JSON non reconnu");

            data = items.slice(0, MAX_ITEMS).map(item => ({
              id: item.id || uid(),
              brand: item.brand || item.marque || "",
              model: item.model || item.modele || "",
              reference: item.reference || item.ref || "",
              length: item.length || item.longueur || "",
              notes: item.notes || ""
            }));

            render();
            await saveNow();
            setStatus("JSON récupéré et enregistré.", "ok");
          } catch (err) {
            setStatus("Le fichier JSON n’est pas valide pour cette appli.", "err");
          } finally {
            els.loadJsonInput.value = "";
          }
        };
        reader.readAsText(file);
      }

      function clearAll() {
        if (!confirm("Vider tout le tableau ?")) return;
        data = [];
        render();
        scheduleSave("Tableau vidé.");
      }

      function openDb() {
        return new Promise((resolve, reject) => {
          if (!("indexedDB" in window)) {
            reject(new Error("IndexedDB non disponible"));
            return;
          }
          const request = indexedDB.open(DB_NAME, 1);

          request.onupgradeneeded = (event) => {
            const database = event.target.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) {
              database.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
          };

          request.onsuccess = () => {
            db = request.result;
            resolve(db);
          };

          request.onerror = () => reject(request.error || new Error("Erreur IndexedDB"));
        });
      }

      function saveFallback() {
        localStorage.setItem(FALLBACK_KEY, JSON.stringify(data));
      }

      function loadFallback() {
        const raw = localStorage.getItem(FALLBACK_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return null;
        return parsed;
      }

      async function saveNow() {
        try {
          if (db) {
            await new Promise((resolve, reject) => {
              const tx = db.transaction(STORE_NAME, "readwrite");
              const store = tx.objectStore(STORE_NAME);
              store.put({ id: STATE_ID, items: data, updatedAt: Date.now() });
              tx.oncomplete = () => resolve();
              tx.onerror = () => reject(tx.error || new Error("Erreur d’écriture"));
              tx.onabort = () => reject(tx.error || new Error("Écriture annulée"));
            });
          }
          saveFallback();
          return true;
        } catch (e) {
          try { saveFallback(); } catch (_) {}
          return false;
        }
      }

      function scheduleSave(message = "Enregistré.") {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          const ok = await saveNow();
          setStatus(ok ? message : "Sauvegarde de secours effectuée.", ok ? "ok" : "warn");
        }, 200);
      }

      async function loadInitialData() {
        let loaded = false;

        try {
          await openDb();
          const fromDb = await new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, "readonly");
            const store = tx.objectStore(STORE_NAME);
            const req = store.get(STATE_ID);
            req.onsuccess = () => resolve(req.result ? req.result.items : null);
            req.onerror = () => reject(req.error || new Error("Lecture IndexedDB impossible"));
          });

          if (Array.isArray(fromDb)) {
            data = fromDb.slice(0, MAX_ITEMS).map(item => ({
              id: item.id || uid(),
              brand: item.brand || "",
              model: item.model || "",
              reference: item.reference || "",
              length: item.length || "",
              notes: item.notes || ""
            }));
            loaded = true;
          }
        } catch (e) {
          // fallback below
        }

        if (!loaded) {
          try {
            const fromFallback = loadFallback();
            if (Array.isArray(fromFallback)) {
              data = fromFallback.slice(0, MAX_ITEMS).map(item => ({
                id: item.id || uid(),
                brand: item.brand || "",
                model: item.model || "",
                reference: item.reference || "",
                length: item.length || "",
                notes: item.notes || ""
              }));
              loaded = true;
            }
          } catch (e) {
            // ignore
          }
        }

        render();
        if (loaded) setStatus("Données restaurées.", "ok");
        else setStatus("Aucune donnée enregistrée pour l’instant.", "warn");
      }

      els.addRowBtn.addEventListener("click", addRow);
      els.saveJsonBtn.addEventListener("click", exportJson);
      els.printBtn.addEventListener("click", () => window.print());
      els.clearBtn.addEventListener("click", clearAll);
      els.searchInput.addEventListener("input", render);
      els.loadJsonInput.addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) importJson(file);
      });

      els.tableBody.addEventListener("input", (e) => {
        const field = e.target.closest("input, textarea");
        if (!field) return;
        const tr = field.closest("tr");
        updateField(tr.dataset.id, field.dataset.field, field.value);
        if (field.tagName === "TEXTAREA") autoResizeTextarea(field);
      });

      els.tableBody.addEventListener("click", (e) => {
        const btn = e.target.closest(".row-delete");
        if (!btn) return;
        const tr = btn.closest("tr");
        deleteRow(tr.dataset.id);
      });

      els.headers.forEach(th => th.addEventListener("click", () => sortBy(th.dataset.key)));

      window.addEventListener("pagehide", () => { saveNow(); });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) saveNow();
      });

      loadInitialData();
    })();
  </script>
</body>
</html>
